<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Практична робота 6 - Завдання 1</title>
    <style>
        body { margin: 0; min-height: 100vh; font-family: Arial, sans-serif; transition: background-color .3s; }
        main { width: 560px; max-width: calc(100% - 32px); margin: 60px auto; padding: 28px; background: rgba(255,255,255,.9); border: 3px solid #222; }
        h1 { margin-top: 0; text-align: center; }
        select { width: 100%; padding: 10px; font-size: 18px; }
    </style>
</head>
<body>
    <main>
        <h1>Кольори фону</h1>
        <p>Оберіть колір зі списку. Порядок кольорів відповідає вибраному варіанту.</p>
        <select id="colors" onchange="changeColor()"></select>
    </main>

    <script type="text/javascript">
        var variants = [
            ['Червоний','Білий','Синій'], ['Синій','Білий','Жовтий'], ['Зелений','Білий','Синій'],
            ['Коричневий','Білий','Сірий'], ['Червоний','Жовтий','Сірий'], ['Синій','Жовтий','Червоний'],
            ['Зелений','Жовтий','Червоний'], ['Коричневий','Жовтий','Червоний'], ['Червоний','Голубий','Зелений'],
            ['Синій','Голубий','Зелений'], ['Сірий','Голубий','Зелений'], ['Коричневий','Голубий','Зелений'],
            ['Червоний','Сірий','Коричневий'], ['Жовтий','Червоний','Синій'], ['Зелений','Сірий','Синій'],
            ['Жовтий','Червоний','Зелений'], ['Голубий','Зелений','Синій'], ['Голубий','Зелений','Жовтий'],
            ['Зелений','Білий','Синій'], ['Коричневий','Білий','Сірий'], ['Червоний','Жовтий','Сірий'],
            ['Синій','Зелений','Червоний'], ['Зелений','Чорний','Червоний'], ['Коричневий','Голубий','Червоний'],
            ['Червоний','Голубий','Зелений'], ['Червоний','Білий','Зелений'], ['Синій','Білий','Зелений'],
            ['Чорний','Білий','Зелений'], ['Коричневий','Білий','Чорний'], ['Зелений','Жовтий','Чорний']
        ];
        var cssColors = {'Червоний':'red','Білий':'white','Синій':'blue','Жовтий':'yellow','Зелений':'green','Коричневий':'brown','Сірий':'gray','Голубий':'deepskyblue','Чорний':'black'};
        var variant = parseInt(prompt('Введіть номер варіанту', '6'), 10);
        if (isNaN(variant) || variant < 1 || variant > variants.length) variant = 6;
        var select = document.getElementById('colors');
        for (var i = 0; i < variants[variant - 1].length; i++) {
            var color = variants[variant - 1][i];
            select.options[i] = new Option(color, cssColors[color]);
        }
        function changeColor() { document.body.style.backgroundColor = select.value; }
        changeColor();
    </script>
</body>
</html>
